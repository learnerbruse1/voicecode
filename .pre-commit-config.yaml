repos:
  - repo: local
    hooks:
      - id: ruff-check
        name: ruff check
        entry: python -m ruff check app.py main.py tests src/voicecode
        language: system
        pass_filenames: false
      - id: ruff-format-check
        name: ruff format --check
        entry: python -m ruff format --check app.py main.py tests src/voicecode
        language: system
        pass_filenames: false
      - id: mypy
        name: mypy
        entry: python -m mypy app.py main.py src/voicecode
        language: system
        pass_filenames: false
