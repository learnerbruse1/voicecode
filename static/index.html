<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VoiceCode</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0f1117;--surface:#1a1d27;--surface2:#22263a;--border:#2e3347;
  --text:#e2e8f0;--muted:#64748b;--accent:#6366f1;
  --red:#ef4444;--green:#22c55e;--yellow:#f59e0b;
}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif}
body{display:flex;flex-direction:column;padding:16px;gap:12px}

/* header */
header{display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
h1{font-size:1.1rem;font-weight:700;letter-spacing:-.02em}
h1 span{color:var(--accent)}
#status{display:flex;align-items:center;gap:6px;font-size:.78rem;color:var(--muted)}
#dot{width:8px;height:8px;border-radius:50%;background:var(--muted);flex-shrink:0;transition:background .3s}
#dot.connected{background:var(--green)}
#dot.recording{background:var(--red);animation:blink 1s infinite}
#dot.processing{background:var(--yellow)}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}

/* config bar */
.cfg{display:flex;gap:8px;flex-wrap:wrap;flex-shrink:0}
select,button.sm{background:var(--surface);color:var(--text);border:1px solid var(--border);border-radius:8px;padding:6px 10px;font-size:.8rem;cursor:pointer;outline:none}
select:focus,button.sm:focus{border-color:var(--accent)}
button.sm{color:var(--muted)}
button.sm:hover{color:var(--text);border-color:var(--accent)}
button.sm.on{color:var(--accent);border-color:var(--accent)}

/* record */
.rec-row{display:flex;align-items:center;gap:16px;background:var(--surface);border-radius:12px;padding:14px 20px;flex-shrink:0}
#rec-btn{width:64px;height:64px;border-radius:50%;border:none;background:var(--surface2);cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:transform .15s;outline:none}
#rec-btn:hover{transform:scale(1.08)}
#rec-btn.recording{background:var(--red);animation:ring 1.5s infinite}
@keyframes ring{0%{box-shadow:0 0 0 0 rgba(239,68,68,.5)}70%{box-shadow:0 0 0 16px rgba(239,68,68,0)}100%{box-shadow:0 0 0 0 rgba(239,68,68,0)}}
.rec-info{flex:1}
.rec-info p{font-size:.95rem;font-weight:500}
.rec-info small{font-size:.75rem;color:var(--muted)}
kbd{background:var(--surface2);border:1px solid var(--border);padding:1px 5px;border-radius:4px;font-size:.72rem}

/* transcript */
.box{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:16px;position:relative;display:flex;flex-direction:column;gap:8px;flex:1;min-height:0}
.box-header{display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.box-label{font-size:.72rem;color:var(--muted);text-transform:uppercase;letter-spacing:.08em}
.box-actions{display:flex;gap:6px}
#transcript{flex:1;overflow-y:auto;font-size:1rem;line-height:1.7;white-space:pre-wrap;word-break:break-word;min-height:0}
#interim{color:var(--muted);font-style:italic;font-size:.9rem;flex-shrink:0}
.placeholder{color:var(--muted)}

/* copy btn */
#copy-btn,#clear-btn{background:var(--surface2);border:1px solid var(--border);color:var(--muted);border-radius:6px;padding:4px 10px;font-size:.75rem;cursor:pointer;transition:all .2s}
#copy-btn:hover,#clear-btn:hover{color:var(--text);border-color:var(--accent)}
#copy-btn.copied{color:var(--green);border-color:var(--green)}
#clear-btn:hover{color:var(--red)}
</style>
</head>
<body>

<header>
  <h1>Voice<span>Code</span></h1>
  <div id="status"><div id="dot"></div><span id="slabel">Disconnected</span></div>
</header>

<div class="cfg">
  <select id="model" title="识别模型（越大越准但越慢）">
    <option value="tiny">模型: Tiny (快)</option>
    <option value="base" selected>模型: Base (推荐)</option>
    <option value="small">模型: Small (准)</option>
    <option value="medium">模型: Medium (最准)</option>
  </select>
  <select id="lang" title="识别语言">
    <option value="auto" selected>语言: 自动</option>
    <option value="zh">语言: 中文</option>
    <option value="en">语言: 英文</option>
  </select>
  <select id="fsize" title="字体大小">
    <option value="0.9rem">字号: 小</option>
    <option value="1rem" selected>字号: 中</option>
    <option value="1.2rem">字号: 大</option>
    <option value="1.5rem">字号: 特大</option>
  </select>
  <button class="sm" id="topbtn" title="窗口置顶">置顶: 关</button>
</div>

<div class="rec-row">
  <button id="rec-btn" title="Space 键切换">
    <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="#e2e8f0" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <rect x="9" y="2" width="6" height="13" rx="3"/>
      <path d="M5 10a7 7 0 0 0 14 0"/>
      <line x1="12" y1="19" x2="12" y2="23"/>
      <line x1="8" y1="23" x2="16" y2="23"/>
    </svg>
  </button>
  <div class="rec-info">
    <p id="rec-label">点击按钮开始录音</p>
    <small>按 <kbd>Space</kbd> 键快速切换 &nbsp;|&nbsp; 说完松开自动识别</small>
  </div>
</div>

<div class="box">
  <div class="box-header">
    <span class="box-label">转录结果</span>
    <div class="box-actions">
      <button id="clear-btn">清空</button>
      <button id="copy-btn">复制</button>
    </div>
  </div>
  <div id="transcript"><span class="placeholder">录音结果将显示在这里...</span></div>
  <div id="interim"></div>
</div>

<script>
const $ = id => document.getElementById(id);
const dot = $('dot'), slabel = $('slabel');
const transcriptEl = $('transcript'), interimEl = $('interim');
const recBtn = $('rec-btn'), copyBtn = $('copy-btn');
const modelSel = $('model'), langSel = $('lang'), fsizeSel = $('fsize');
const topBtn = $('topbtn'), recLabel = $('rec-label');

let ws, recording = false, text = '';

// --- font size ---
fsizeSel.onchange = () => { transcriptEl.style.fontSize = fsizeSel.value; };

// --- always on top (pywebview API) ---
let onTop = false;
topBtn.onclick = () => {
  onTop = !onTop;
  topBtn.textContent = `置顶: ${onTop ? '开' : '关'}`;
  topBtn.classList.toggle('on', onTop);
  if (window.pywebview) pywebview.api.set_on_top(onTop);
};

// --- model hot-reload ---
modelSel.onchange = async () => {
  slabel.textContent = '切换模型中...';
  try {
    await fetch('/reload_model', {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({model: modelSel.value})
    });
  } catch(e) {}
  connect();
};

// --- WebSocket ---
function setStatus(state, msg) { dot.className = state; slabel.textContent = msg; }

function connect() {
  if (ws && ws.readyState < 2) return;
  ws = new WebSocket('ws://localhost:7788/ws');
  ws.binaryType = 'arraybuffer';
  ws.onopen = () => { setStatus('connected', '已连接'); sendCfg(); };
  ws.onclose = () => { setStatus('', '已断开'); if(recording) stopRec(); setTimeout(connect, 3000); };
  ws.onerror = () => ws.close();
  ws.onmessage = e => {
    if (typeof e.data !== 'string') return;
    const d = JSON.parse(e.data);
    if (d.type === 'interim') { interimEl.textContent = d.text; }
    else if (d.type === 'processing') { setStatus('processing', '识别中...'); }
    else if (d.type === 'final') {
      interimEl.textContent = '';
      if (d.text) { text += (text ? '\n' : '') + d.text; renderText(); }
      setStatus('connected', '已连接');
    }
  };
}

function sendCfg() {
  if (ws?.readyState === 1)
    ws.send(JSON.stringify({type:'config', language: langSel.value}));
}

langSel.onchange = sendCfg;

function renderText() {
  if (text) transcriptEl.textContent = text;
  else transcriptEl.innerHTML = '<span class="placeholder">录音结果将显示在这里...</span>';
}

// --- recording ---
let audioCtx, processor, source, stream;

async function startRec() {
  if (recording) return;
  if (!ws || ws.readyState !== 1) { connect(); return; }
  try {
    stream = await navigator.mediaDevices.getUserMedia({audio:true});
    audioCtx = new AudioContext({sampleRate:16000});
    source = audioCtx.createMediaStreamSource(stream);
    processor = audioCtx.createScriptProcessor(4096, 1, 1);
    processor.onaudioprocess = e => {
      if (!recording || ws.readyState !== 1) return;
      const f = e.inputBuffer.getChannelData(0);
      const pcm = new Int16Array(f.length);
      for (let i = 0; i < f.length; i++) pcm[i] = Math.max(-32768, Math.min(32767, f[i]*32768));
      ws.send(pcm.buffer);
    };
    source.connect(processor);
    processor.connect(audioCtx.destination);
    recording = true;
    recBtn.classList.add('recording');
    recLabel.textContent = '录音中... 点击或按 Space 停止';
    setStatus('recording', '录音中...');
    ws.send(JSON.stringify({type:'start', language: langSel.value}));
  } catch(err) {
    alert('麦克风错误: ' + err.message);
  }
}

function stopRec() {
  if (!recording) return;
  recording = false;
  recBtn.classList.remove('recording');
  recLabel.textContent = '点击按钮开始录音';
  processor?.disconnect(); processor = null;
  source?.disconnect(); source = null;
  stream?.getTracks().forEach(t => t.stop()); stream = null;
  audioCtx?.close(); audioCtx = null;
  if (ws?.readyState === 1) {
    ws.send(JSON.stringify({type:'stop'}));
    setStatus('processing', '识别中...');
  } else {
    setStatus('connected', '已连接');
  }
}

recBtn.onclick = () => recording ? stopRec() : startRec();

document.addEventListener('keydown', e => {
  if (e.code === 'Space' && e.target === document.body) {
    e.preventDefault();
    recording ? stopRec() : startRec();
  }
});

copyBtn.onclick = () => {
  const all = text + (interimEl.textContent ? '\n' + interimEl.textContent : '');
  if (!all.trim()) return;
  navigator.clipboard.writeText(all).then(() => {
    copyBtn.textContent = '已复制!';
    copyBtn.classList.add('copied');
    setTimeout(() => { copyBtn.textContent = '复制'; copyBtn.classList.remove('copied'); }, 1500);
  });
};

$('clear-btn').onclick = () => { text = ''; renderText(); interimEl.textContent = ''; };

connect();
</script>
</body>
</html>
