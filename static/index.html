<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Speech to Text</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0f1117;--surface:#1a1d27;--surface2:#22263a;--border:#2e3347;
  --text:#e2e8f0;--muted:#64748b;--accent:#6366f1;
  --red:#ef4444;--green:#22c55e;--yellow:#f59e0b;
}
body{background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:24px 16px}
header{width:100%;max-width:800px;display:flex;align-items:center;justify-content:space-between;margin-bottom:32px}
h1{font-size:1.4rem;font-weight:600;letter-spacing:-.02em}
h1 span{color:var(--accent)}
#status{display:flex;align-items:center;gap:8px;font-size:.8rem;color:var(--muted)}
#status-dot{width:8px;height:8px;border-radius:50%;background:var(--muted);transition:background .3s}
#status-dot.connected{background:var(--green)}
#status-dot.recording{background:var(--red);animation:blink 1s infinite}
#status-dot.processing{background:var(--yellow)}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}
main{width:100%;max-width:800px;display:flex;flex-direction:column;gap:20px}
.row{display:flex;gap:12px;flex-wrap:wrap}
select{background:var(--surface);color:var(--text);border:1px solid var(--border);border-radius:8px;padding:8px 12px;font-size:.875rem;cursor:pointer;outline:none;flex:1;min-width:130px}
select:focus{border-color:var(--accent)}
.record-wrap{display:flex;flex-direction:column;align-items:center;gap:14px;padding:32px;background:var(--surface);border-radius:16px;border:1px solid var(--border)}
#record-btn{width:88px;height:88px;border-radius:50%;border:none;background:var(--surface2);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:transform .2s;outline:none}
#record-btn:hover{transform:scale(1.07)}
#record-btn.recording{background:var(--red);animation:ring 1.5s infinite}
@keyframes ring{0%{box-shadow:0 0 0 0 rgba(239,68,68,.5)}70%{box-shadow:0 0 0 20px rgba(239,68,68,0)}100%{box-shadow:0 0 0 0 rgba(239,68,68,0)}}
.hint{font-size:.75rem;color:var(--muted)}
kbd{background:var(--surface2);border:1px solid var(--border);padding:1px 6px;border-radius:4px;font-size:.75rem}
.box{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:20px;position:relative}
.box label{font-size:.75rem;color:var(--muted);text-transform:uppercase;letter-spacing:.08em;display:block;margin-bottom:12px}
#transcript{font-size:1.05rem;line-height:1.7;min-height:80px;white-space:pre-wrap;word-break:break-word}
#interim{color:var(--muted);font-style:italic}
.placeholder{color:var(--muted)}
#copy-btn{position:absolute;top:16px;right:16px;background:var(--surface2);border:1px solid var(--border);color:var(--muted);border-radius:8px;padding:6px 12px;font-size:.8rem;cursor:pointer;transition:all .2s}
#copy-btn:hover{color:var(--text);border-color:var(--accent)}
#copy-btn.copied{color:var(--green);border-color:var(--green)}
.hist-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}
.hist-header label{font-size:.75rem;color:var(--muted);text-transform:uppercase;letter-spacing:.08em}
#clear-btn{background:none;border:none;color:var(--muted);font-size:.75rem;cursor:pointer;padding:2px 6px;border-radius:4px}
#clear-btn:hover{color:var(--red)}
#history{display:flex;flex-direction:column;gap:8px}
.h-item{background:var(--surface2);border-radius:8px;padding:10px 14px;font-size:.875rem;display:flex;justify-content:space-between;align-items:flex-start;gap:12px;cursor:pointer;border:1px solid transparent;transition:border-color .2s}
.h-item:hover{border-color:var(--accent)}
.h-text{flex:1;line-height:1.5}
.h-time{font-size:.72rem;color:var(--muted);white-space:nowrap}
.empty{color:var(--muted);font-size:.875rem}
@media(max-width:500px){.record-wrap{padding:24px 12px}#record-btn{width:72px;height:72px}}
</style>
</head>
<body>
<header>
  <h1>Speech<span>2</span>Text</h1>
  <div id="status"><div id="status-dot"></div><span id="status-label">Disconnected</span></div>
</header>
<main>
  <div class="row">
    <select id="model">
      <option value="tiny">Model: Tiny</option>
      <option value="base" selected>Model: Base</option>
      <option value="small">Model: Small</option>
      <option value="medium">Model: Medium</option>
    </select>
    <select id="lang">
      <option value="auto" selected>Language: Auto</option>
      <option value="zh">Language: Chinese</option>
      <option value="en">Language: English</option>
    </select>
  </div>

  <div class="record-wrap">
    <button id="record-btn" title="Toggle recording (Space)">
      <svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="#e2e8f0" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <rect x="9" y="2" width="6" height="13" rx="3"/>
        <path d="M5 10a7 7 0 0 0 14 0"/>
        <line x1="12" y1="19" x2="12" y2="23"/>
        <line x1="8" y1="23" x2="16" y2="23"/>
      </svg>
    </button>
    <span class="hint">Press <kbd>Space</kbd> to toggle recording</span>
  </div>

  <div class="box">
    <label>Transcription</label>
    <button id="copy-btn">Copy</button>
    <div id="transcript"><span class="placeholder">Your transcription will appear here...</span></div>
    <div id="interim"></div>
  </div>

  <div class="box">
    <div class="hist-header">
      <label>Recent</label>
      <button id="clear-btn">Clear</button>
    </div>
    <div id="history"><p class="empty">No history yet.</p></div>
  </div>
</main>

<script>
const WS_URL = 'ws://localhost:7788/ws';
const $ = id => document.getElementById(id);
const dot = $('status-dot'), lbl = $('status-label');
const transcriptEl = $('transcript'), interimEl = $('interim');
const recordBtn = $('record-btn'), copyBtn = $('copy-btn');
const modelSel = $('model'), langSel = $('lang');
const historyEl = $('history');

let ws, recording = false;
let audioCtx, processor, source, stream;
let text = '';
let hist = JSON.parse(localStorage.getItem('stt_hist') || '[]');

function setStatus(state, msg) {
  dot.className = state;
  lbl.textContent = msg;
}

function connect() {
  if (ws && ws.readyState < 2) return;
  ws = new WebSocket(WS_URL);
  ws.binaryType = 'arraybuffer';
  ws.onopen = () => {
    setStatus('connected', 'Connected');
    sendConfig();
  };
  ws.onclose = () => {
    setStatus('', 'Disconnected');
    if (recording) stopRec();
    setTimeout(connect, 3000);
  };
  ws.onerror = () => ws.close();
  ws.onmessage = e => {
    if (typeof e.data !== 'string') return;
    const d = JSON.parse(e.data);
    if (d.type === 'interim') {
      interimEl.textContent = d.text;
      setStatus('recording', 'Recording...');
    } else if (d.type === 'final') {
      interimEl.textContent = '';
      if (d.text && d.text.trim()) {
        text += (text ? '\n' : '') + d.text.trim();
        renderText();
        pushHist(d.text.trim());
      }
      setStatus('connected', 'Connected');
    } else if (d.type === 'processing') {
      setStatus('processing', 'Processing...');
    }
  };
}

function sendConfig() {
  if (ws && ws.readyState === 1)
    ws.send(JSON.stringify({ type: 'config', model: modelSel.value, language: langSel.value }));
}

function renderText() {
  transcriptEl.textContent = text || '';
  if (!text) transcriptEl.innerHTML = '<span class="placeholder">Your transcription will appear here...</span>';
}

function pushHist(t) {
  hist.unshift({ t, time: new Date().toLocaleTimeString() });
  if (hist.length > 20) hist.pop();
  localStorage.setItem('stt_hist', JSON.stringify(hist));
  renderHist();
}

function renderHist() {
  if (!hist.length) { historyEl.innerHTML = '<p class="empty">No history yet.</p>'; return; }
  historyEl.innerHTML = '';
  hist.forEach(item => {
    const d = document.createElement('div');
    d.className = 'h-item';
    d.title = 'Click to append';
    d.innerHTML = `<span class="h-text">${esc(item.t)}</span><span class="h-time">${item.time}</span>`;
    d.onclick = () => { text += (text ? '\n' : '') + item.t; renderText(); };
    historyEl.appendChild(d);
  });
}

function esc(s) { return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

async function startRec() {
  if (!ws || ws.readyState !== 1) { connect(); return; }
  try {
    stream = await navigator.mediaDevices.getUserMedia({ audio: true });
    audioCtx = new AudioContext({ sampleRate: 16000 });
    source = audioCtx.createMediaStreamSource(stream);
    processor = audioCtx.createScriptProcessor(4096, 1, 1);
    processor.onaudioprocess = e => {
      if (!recording || ws.readyState !== 1) return;
      const f = e.inputBuffer.getChannelData(0);
      const pcm = new Int16Array(f.length);
      for (let i = 0; i < f.length; i++) pcm[i] = Math.max(-32768, Math.min(32767, f[i] * 32768));
      ws.send(pcm.buffer);
    };
    source.connect(processor);
    processor.connect(audioCtx.destination);
    recording = true;
    recordBtn.classList.add('recording');
    setStatus('recording', 'Recording...');
    ws.send(JSON.stringify({ type: 'start', model: modelSel.value, language: langSel.value }));
  } catch (err) {
    alert('Microphone error: ' + err.message);
  }
}

function stopRec() {
  recording = false;
  recordBtn.classList.remove('recording');
  processor && (processor.disconnect(), processor = null);
  source && (source.disconnect(), source = null);
  stream && (stream.getTracks().forEach(t => t.stop()), stream = null);
  audioCtx && (audioCtx.close(), audioCtx = null);
  if (ws && ws.readyState === 1) {
    ws.send(JSON.stringify({ type: 'stop' }));
    setStatus('processing', 'Processing...');
  } else {
    setStatus('connected', 'Connected');
  }
}

recordBtn.onclick = () => recording ? stopRec() : startRec();

copyBtn.onclick = () => {
  const all = text + (interimEl.textContent ? '\n' + interimEl.textContent : '');
  if (!all.trim()) return;
  navigator.clipboard.writeText(all).then(() => {
    copyBtn.textContent = 'Copied!';
    copyBtn.classList.add('copied');
    setTimeout(() => { copyBtn.textContent = 'Copy'; copyBtn.classList.remove('copied'); }, 1500);
  });
};

$('clear-btn').onclick = () => {
  hist = [];
  localStorage.removeItem('stt_hist');
  renderHist();
};

document.addEventListener('keydown', e => {
  if (e.code === 'Space' && e.target === document.body) {
    e.preventDefault();
    recording ? stopRec() : startRec();
  }
});

modelSel.onchange = langSel.onchange = sendConfig;

renderHist();
connect();
</script>
</body>
</html>
