<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VoiceCode</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0f1117;--surface:#1a1d27;--surface2:#22263a;--border:#2e3347;
  --text:#e2e8f0;--muted:#64748b;--accent:#6366f1;
  --red:#ef4444;--green:#22c55e;--yellow:#f59e0b;
}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif}
body{display:flex;flex-direction:column;padding:14px;gap:10px}
header{display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
h1{font-size:1.1rem;font-weight:700;letter-spacing:-.02em}
h1 span{color:var(--accent)}
#status{display:flex;align-items:center;gap:6px;font-size:.78rem;color:var(--muted)}
#dot{width:8px;height:8px;border-radius:50%;background:var(--muted);flex-shrink:0;transition:background .3s}
#dot.connected{background:var(--green)}
#dot.recording{background:var(--red);animation:blink 1s infinite}
#dot.processing{background:var(--yellow)}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}
.settings{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:12px 16px;flex-shrink:0;display:flex;flex-direction:column;gap:10px}
.settings-row{display:flex;gap:8px;flex-wrap:wrap;align-items:center}
.settings-row label{font-size:.75rem;color:var(--muted);white-space:nowrap;min-width:44px}
select,button.sm{background:var(--surface2);color:var(--text);border:1px solid var(--border);border-radius:7px;padding:5px 10px;font-size:.8rem;cursor:pointer;outline:none}
select:focus,button.sm:focus{border-color:var(--accent)}
button.sm{color:var(--muted)}
button.sm:hover{color:var(--text);border-color:var(--accent)}
button.sm.on{color:var(--accent);border-color:var(--accent)}
.hk-row{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
#hk-display{background:var(--surface2);border:1px solid var(--border);border-radius:7px;padding:5px 12px;font-size:.8rem;min-width:110px;text-align:center;color:var(--text)}
#hk-display.recording-key{border-color:var(--accent);color:var(--accent);animation:blink .8s infinite}
.hk-presets{display:flex;gap:5px;flex-wrap:wrap}
.hk-preset{background:var(--surface2);border:1px solid var(--border);border-radius:6px;padding:3px 8px;font-size:.75rem;cursor:pointer;color:var(--muted);transition:all .15s}
.hk-preset:hover{color:var(--text);border-color:var(--accent)}
.hk-preset.active{color:var(--accent);border-color:var(--accent)}
.rec-row{display:flex;align-items:center;gap:14px;background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:12px 18px;flex-shrink:0}
#rec-btn{width:60px;height:60px;border-radius:50%;border:none;background:var(--surface2);cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:transform .15s;outline:none}
#rec-btn:hover{transform:scale(1.08)}
#rec-btn.recording{background:var(--red);animation:ring 1.5s infinite}
@keyframes ring{0%{box-shadow:0 0 0 0 rgba(239,68,68,.5)}70%{box-shadow:0 0 0 14px rgba(239,68,68,0)}100%{box-shadow:0 0 0 0 rgba(239,68,68,0)}}
.rec-info{flex:1}
.rec-info p{font-size:.9rem;font-weight:500}
.rec-info small{font-size:.73rem;color:var(--muted)}
kbd{background:var(--surface2);border:1px solid var(--border);padding:1px 5px;border-radius:4px;font-size:.72rem}
.box{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:14px;display:flex;flex-direction:column;gap:8px;flex:1;min-height:0}
.box-header{display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.box-label{font-size:.72rem;color:var(--muted);text-transform:uppercase;letter-spacing:.08em}
.box-actions{display:flex;gap:6px}
#transcript{flex:1;overflow-y:auto;line-height:1.7;white-space:pre-wrap;word-break:break-word;min-height:0}
#interim{color:var(--muted);font-style:italic;font-size:.9rem;flex-shrink:0}
.placeholder{color:var(--muted)}
#copy-btn,#clear-btn{background:var(--surface2);border:1px solid var(--border);color:var(--muted);border-radius:6px;padding:4px 10px;font-size:.75rem;cursor:pointer;transition:all .2s}
#copy-btn:hover,#clear-btn:hover{color:var(--text);border-color:var(--accent)}
#copy-btn.copied{color:var(--green);border-color:var(--green)}
#clear-btn:hover{color:var(--red)}
</style>
</head>
<body>
<header>
  <h1>Voice<span>Code</span></h1>
  <div id="status"><div id="dot"></div><span id="slabel">未连接</span></div>
</header>
<div class="settings">
  <div class="settings-row">
    <label>模型</label>
    <select id="model">
      <option value="tiny">Tiny（最快，~75MB）</option>
      <option value="base">Base（推荐，~150MB）</option>
      <option value="small">Small（更准，~500MB）</option>
      <option value="medium">Medium（最准，~1.5GB）</option>
    </select>
    <label>语言</label>
    <select id="lang">
      <option value="auto">自动检测</option>
      <option value="zh">中文</option>
      <option value="en">英文</option>
    </select>
  </div>
  <div class="settings-row">
    <label>字号</label>
    <select id="fsize">
      <option value="0.85rem">小</option>
      <option value="1rem">中</option>
      <option value="1.2rem">大</option>
      <option value="1.5rem">特大</option>
    </select>
    <label>结果</label>
    <select id="appendmode">
      <option value="append">追加</option>
      <option value="replace">替换</option>
    </select>
    <button class="sm" id="topbtn">置顶: 关</button>
  </div>
  <div class="settings-row hk-row">
    <label>全局键</label>
    <div id="hk-display">Alt+Z</div>
    <button class="sm" id="hk-record-btn">点击设置</button>
    <div class="hk-presets">
      <button class="hk-preset" data-mods="alt"        data-key="z">Alt+Z</button>
      <button class="hk-preset" data-mods="alt"        data-key="x">Alt+X</button>
      <button class="hk-preset" data-mods="ctrl,shift" data-key="r">Ctrl+Shift+R</button>
      <button class="hk-preset" data-mods="ctrl,alt"   data-key="space">Ctrl+Alt+Space</button>
    </div>
  </div>
</div>
<div class="rec-row">
  <button id="rec-btn" title="按住 Space 录音，松开识别">
    <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="#e2e8f0" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <rect x="9" y="2" width="6" height="13" rx="3"/>
      <path d="M5 10a7 7 0 0 0 14 0"/>
      <line x1="12" y1="19" x2="12" y2="23"/>
      <line x1="8" y1="23" x2="16" y2="23"/>
    </svg>
  </button>
  <div class="rec-info">
    <p id="rec-label">按住 Space 开始录音</p>
    <small>此窗口内：<kbd>按住 Space</kbd> 录音松开识别 &nbsp;|&nbsp; 其他窗口：全局快捷键切换</small>
  </div>
</div>
<div class="box">
  <div class="box-header">
    <span class="box-label">转录结果</span>
    <div class="box-actions">
      <button id="cancel-btn" style="display:none">取消识别</button>
      <button id="clear-btn">清空</button>
      <button id="copy-btn">复制</button>
    </div>
  </div>
  <div id="transcript"><span class="placeholder">录音结果将显示在这里...</span></div>
  <div id="interim"></div>
</div>

<script>
// AudioWorklet Blob URL approach is unreliable in pywebview WebView2.
// Use ScriptProcessor (deprecated but universally supported in embedded WebViews).

const $ = id => document.getElementById(id);
const dot=$('dot'),slabel=$('slabel'),transcriptEl=$('transcript'),interimEl=$('interim');
const recBtn=$('rec-btn'),copyBtn=$('copy-btn'),recLabel=$('rec-label'),cancelBtn=$('cancel-btn');
const modelSel=$('model'),langSel=$('lang'),fsizeSel=$('fsize'),appendSel=$('appendmode'),topBtn=$('topbtn');
const hkDisplay=$('hk-display'),hkRecordBtn=$('hk-record-btn');

// Use dynamic port from current page location (works with PORT env var)
const WS_PORT = location.port || 7788;
const WS_URL  = `ws://localhost:${WS_PORT}/ws`;

let ws, wsRetryDelay = 1000, wsConnecting = false;
let recording = false, text = '';
let audioCtx, processor, source, stream;
let currentHotkey = {modifiers:['alt'], key:'z'};

// ---- Config ----
async function loadConfig() {
  try {
    const cfg = await fetch('/config').then(r=>r.json());
    modelSel.value  = cfg.model      || 'base';
    langSel.value   = cfg.language   || 'zh';
    fsizeSel.value  = cfg.font_size  || '1rem';
    appendSel.value = cfg.append_mode|| 'append';
    transcriptEl.style.fontSize = fsizeSel.value;
    if (cfg.on_top) { onTop=true; topBtn.textContent='置顶: 开'; topBtn.classList.add('on'); }
    if (cfg.hotkey) { currentHotkey = cfg.hotkey; renderHkDisplay(); }
    updatePresetHighlight();
  } catch(e) {}
}
async function saveConfig(patch) {
  try { await fetch('/config',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(patch)}); }
  catch(e) {}
}

// ---- Hotkey UI ----
function hotkeyLabel(hk) {
  const mods = (hk.modifiers||[]).map(m=>m[0].toUpperCase()+m.slice(1));
  const k = hk.key==='space' ? 'Space' : hk.key.toUpperCase();
  return [...mods, k].join('+');
}
function renderHkDisplay() { hkDisplay.textContent = hotkeyLabel(currentHotkey); }
function updatePresetHighlight() {
  document.querySelectorAll('.hk-preset').forEach(btn => {
    const mods = btn.dataset.mods.split(',').filter(Boolean).sort();
    const cur  = [...(currentHotkey.modifiers||[])].sort();
    btn.classList.toggle('active', cur.join(',')===mods.join(',') && btn.dataset.key===currentHotkey.key);
  });
}
async function applyHotkey(hk) {
  currentHotkey = hk;
  renderHkDisplay(); updatePresetHighlight();
  await saveConfig({hotkey: hk});
  if (window.pywebview) pywebview.api.update_hotkey(hk);
}
document.querySelectorAll('.hk-preset').forEach(btn => {
  btn.onclick = () => applyHotkey({modifiers: btn.dataset.mods.split(',').filter(Boolean), key: btn.dataset.key});
});

let recordingKey=false, pendingMods=[];
hkRecordBtn.onclick = () => {
  if (recordingKey) return;
  recordingKey=true; pendingMods=[];
  hkDisplay.classList.add('recording-key');
  hkDisplay.textContent='请按下快捷键...';
  hkRecordBtn.textContent='按下任意键...';
};
const MOD_KEYS = new Set(['Alt','AltGraph','Control','Shift','Meta']);
document.addEventListener('keydown', e => {
  if (!recordingKey) return;
  e.preventDefault();
  if (MOD_KEYS.has(e.key)) {
    const m = e.key.toLowerCase().replace('control','ctrl').replace('meta','ctrl').replace('altgraph','alt');
    if (!pendingMods.includes(m)) pendingMods.push(m);
    return;
  }
  const key = e.key.toLowerCase()===' ' ? 'space' : e.key.toLowerCase();
  recordingKey=false;
  hkDisplay.classList.remove('recording-key');
  hkRecordBtn.textContent='点击设置';
  applyHotkey({modifiers:[...new Set(pendingMods)], key});
});

// ---- Settings ----
fsizeSel.onchange = () => { transcriptEl.style.fontSize=fsizeSel.value; saveConfig({font_size:fsizeSel.value}); };
appendSel.onchange = () => saveConfig({append_mode:appendSel.value});
langSel.onchange = () => { sendCfg(); saveConfig({language:langSel.value}); };

let onTop=false;
topBtn.onclick = () => {
  onTop=!onTop; topBtn.textContent=`置顶: ${onTop?'开':'关'}`; topBtn.classList.toggle('on',onTop);
  if(window.pywebview) pywebview.api.set_on_top(onTop);
  saveConfig({on_top:onTop});
};
modelSel.onchange = async () => {
  setStatus('processing','切换模型中...');
  try { await fetch('/reload_model',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({model:modelSel.value})}); }
  catch(e){}
  saveConfig({model:modelSel.value});
  setStatus('connected','已连接');
};

// ---- WebSocket with exponential backoff ----
function setStatus(state,msg){dot.className=state;slabel.textContent=msg;}
function connect(){
  if(wsConnecting||(ws&&ws.readyState<2)) return;
  wsConnecting=true;
  ws=new WebSocket(WS_URL);
  ws.binaryType='arraybuffer';
  ws.onopen=()=>{ wsConnecting=false; wsRetryDelay=1000; setStatus('connected','已连接'); sendCfg(); };
  ws.onclose=()=>{
    wsConnecting=false;
    setStatus('','已断开');
    if(recording) stopRec();
    setTimeout(connect, wsRetryDelay);
    wsRetryDelay = Math.min(wsRetryDelay*2, 16000);
  };
  ws.onerror=()=>{ wsConnecting=false; ws.close(); };
  ws.onmessage=e=>{
    if(typeof e.data!=='string') return;
    const d=JSON.parse(e.data);
    if(d.type==='processing'){ setStatus('processing','识别中...'); cancelBtn.style.display=''; }
    else if(d.type==='cancelled'||d.type==='final'){
      cancelBtn.style.display='none';
      interimEl.textContent='';
      if(d.type==='final'&&d.text){ text=appendSel.value==='append'?(text?(text+'\n'+d.text):d.text):d.text; renderText(); }
      setStatus('connected','已连接');
    }
  };
}
function sendCfg(){ if(ws?.readyState===1) ws.send(JSON.stringify({type:'config',language:langSel.value})); }
function renderText(){
  if(text) transcriptEl.textContent=text;
  else transcriptEl.innerHTML='<span class="placeholder">录音结果将显示在这里...</span>';
}

// ---- Recording (ScriptProcessor — reliable in pywebview WebView2) ----
function resampleTo16k(float32, fromRate) {
  if (!float32 || float32.length === 0) return new Float32Array(0);
  if (fromRate === 16000) return float32;
  const ratio = fromRate / 16000;
  const outLen = Math.floor(float32.length / ratio);
  const out = new Float32Array(outLen);
  for (let i = 0; i < outLen; i++) {
    const pos = i * ratio, idx = Math.floor(pos), frac = pos - idx;
    out[i] = (float32[idx] ?? 0) + frac * ((float32[idx+1] ?? float32[idx] ?? 0) - (float32[idx] ?? 0));
  }
  return out;
}

function floatTo16bit(float32) {
  const pcm = new Int16Array(float32.length);
  for (let i = 0; i < float32.length; i++)
    pcm[i] = Math.max(-32768, Math.min(32767, float32[i] * 32768));
  return pcm;
}

async function startRec(){
  if(recording) return;
  if(!ws||ws.readyState!==1){ connect(); return; }
  try{
    stream = await navigator.mediaDevices.getUserMedia({audio:{echoCancellation:true,noiseSuppression:true}});
    audioCtx = new AudioContext();
    const nativeRate = audioCtx.sampleRate;
    source = audioCtx.createMediaStreamSource(stream);
    processor = audioCtx.createScriptProcessor(4096, 1, 1);
    processor.onaudioprocess = e => {
      if(!recording || ws.readyState!==1) return;
      const pcm = floatTo16bit(resampleTo16k(e.inputBuffer.getChannelData(0), nativeRate));
      ws.send(pcm.buffer);
    };
    source.connect(processor);
    processor.connect(audioCtx.destination);
    recording=true;
    recBtn.classList.add('recording');
    recLabel.textContent='录音中... 松开停止';
    setStatus('recording','录音中...');
    ws.send(JSON.stringify({type:'start',language:langSel.value}));
  }catch(err){ alert('麦克风错误: '+err.message); }
}

function stopRec(){
  if(!recording) return;
  recording=false;
  recBtn.classList.remove('recording');
  recLabel.textContent='按住 Space 开始录音';
  if(ws?.readyState===1){ ws.send(JSON.stringify({type:'stop'})); setStatus('processing','识别中...'); }
  else setStatus('connected','已连接');
  processor?.disconnect(); processor=null;
  source?.disconnect(); source=null;
  stream?.getTracks().forEach(t=>t.stop()); stream=null;
  audioCtx?.close(); audioCtx=null;
}

window._recToggle = () => recording ? stopRec() : startRec();
window._recStart  = () => { if (!recording) startRec(); };
window._recStop   = () => { if (recording)  stopRec(); };
window._appendText = t => { text=appendSel.value==='append'?(text?(text+'\n'+t):t):t; renderText(); };

document.addEventListener('keydown',e=>{
  if(recordingKey) return;
  if(e.code==='Space'&&!e.repeat){ e.preventDefault(); startRec(); }
});
document.addEventListener('keyup',e=>{
  if(e.code==='Space'){ e.preventDefault(); stopRec(); }
});
recBtn.addEventListener('mousedown',startRec);
recBtn.addEventListener('mouseup',stopRec);
recBtn.addEventListener('mouseleave',()=>{ if(recording) stopRec(); });

// Copy only confirmed text (not interim)
copyBtn.onclick=()=>{
  if(!text.trim()) return;
  navigator.clipboard.writeText(text).then(()=>{
    copyBtn.textContent='已复制!'; copyBtn.classList.add('copied');
    setTimeout(()=>{ copyBtn.textContent='复制'; copyBtn.classList.remove('copied'); },1500);
  });
};
$('clear-btn').onclick=()=>{ text=''; renderText(); interimEl.textContent=''; };
cancelBtn.onclick=()=>{
  if(ws?.readyState===1){ ws.send(JSON.stringify({type:'cancel'})); }
  cancelBtn.style.display='none';
  setStatus('connected','已连接');
};

// Request mic permission on startup so the prompt appears immediately
navigator.mediaDevices.getUserMedia({audio:true})
  .then(s=>s.getTracks().forEach(t=>t.stop()))
  .catch(err=>setStatus('', err.name==='NotAllowedError'?'请允许麦克风访问':'麦克风不可用'));

loadConfig().then(()=>connect());
</script>
</body>
</html>
