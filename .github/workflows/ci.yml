name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, ubuntu-latest, macos-latest]
        python-version: ["3.10", "3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install package
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"
      - name: Ruff check
        run: python -m ruff check app.py main.py tests src/voicecode
      - name: Ruff format check
        run: python -m ruff format --check app.py main.py tests src/voicecode
      - name: Mypy
        run: python -m mypy app.py main.py src/voicecode
      - name: Pytest
        run: python -m pytest
      - name: Build wheel
        run: python -m pip wheel . --no-deps -w dist
