<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VoiceCode</title>
<link rel="stylesheet" href="/css/app.css">
</head>
<body>
<header>
  <h1>Voice<span>Code</span></h1>
  <div id="status"><div id="dot"></div><span id="slabel" data-i18n="status_ready">Ready</span></div>
</header>
<div id="perf"></div>
<div class="settings">
  <div class="settings-row">
    <label for="model" data-i18n="label_model">Model</label>
    <select id="model">
      <option value="tiny" data-i18n="model_tiny">Tiny (fast, ~75 MB)</option>
      <option value="base" data-i18n="model_base">Base (recommended, ~150 MB)</option>
      <option value="small" data-i18n="model_small">Small (more accurate, ~500 MB)</option>
      <option value="medium" data-i18n="model_medium">Medium (most accurate, ~1.5 GB)</option>
    </select>
    <label for="lang" data-i18n="label_transcription_language">Transcription language</label>
    <select id="lang">
      <option value="auto" data-i18n="lang_auto">Auto detect</option>
      <option value="zh" data-i18n="lang_zh">Chinese</option>
      <option value="en" data-i18n="lang_en">English</option>
      <option value="ja" data-i18n="lang_ja">Japanese</option>
    </select>
    <label for="uilang" data-i18n="label_ui_language">UI language</label>
    <select id="uilang">
      <option value="en">English</option>
      <option value="zh">&#20013;&#25991;</option>
      <option value="ja">&#26085;&#26412;&#35486;</option>
    </select>
  </div>
  <div class="settings-row">
    <label for="audio-device" data-i18n="label_audio_device">Microphone</label>
    <select id="audio-device">
      <option value="" data-i18n="audio_default">System default</option>
    </select>
    <label for="text-mode" data-i18n="label_text_mode">Text mode</label>
    <select id="text-mode">
      <option value="plain" data-i18n="text_plain">Plain</option>
      <option value="coding" data-i18n="text_coding">Coding</option>
      <option value="markdown" data-i18n="text_markdown">Markdown</option>
      <option value="prompt" data-i18n="text_prompt">Prompt</option>
    </select>
    <label for="history-enabled" data-i18n="label_history">History</label>
    <select id="history-enabled">
      <option value="true" data-i18n="history_on">On</option>
      <option value="false" data-i18n="history_off">Off</option>
    </select>
    <button class="sm" id="history-btn" type="button" data-i18n="history">History</button>
    <button class="sm" id="clear-history-btn" type="button" data-i18n="clear_history">Clear history</button>
    <button class="sm" id="diagnostics-btn" type="button" data-i18n="diagnostics">Diagnostics</button>
  </div>
  <div class="settings-row">
    <label for="fsize" data-i18n="label_font_size">Font size</label>
    <select id="fsize">
      <option value="0.85rem" data-i18n="font_small">Small</option>
      <option value="1rem" data-i18n="font_medium">Medium</option>
      <option value="1.2rem" data-i18n="font_large">Large</option>
      <option value="1.5rem" data-i18n="font_xlarge">Extra large</option>
    </select>
    <label for="appendmode" data-i18n="label_result_mode">Result</label>
    <select id="appendmode">
      <option value="append" data-i18n="mode_append">Append</option>
      <option value="replace" data-i18n="mode_replace">Replace</option>
    </select>
    <button class="sm" id="topbtn" type="button"></button>
  </div>
  <div class="settings-row hk-row">
    <label data-i18n="label_global_hotkey">Global hotkey</label>
    <div id="hk-display">Alt+Z</div>
    <button class="sm" id="hk-record-btn" type="button" data-i18n="set_hotkey">Set hotkey</button>
    <div class="hk-presets">
      <button class="hk-preset" type="button" data-mods="alt" data-key="z">Alt+Z</button>
      <button class="hk-preset" type="button" data-mods="alt" data-key="x">Alt+X</button>
      <button class="hk-preset" type="button" data-mods="ctrl,shift" data-key="r">Ctrl+Shift+R</button>
      <button class="hk-preset" type="button" data-mods="ctrl,alt" data-key="space">Ctrl+Alt+Space</button>
    </div>
  </div>
</div>
<div class="rec-row">
  <button id="rec-btn" type="button" data-i18n-title="record_button_title" title="Hold Space to record, release to transcribe">
    <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="#e2e8f0" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
      <rect x="9" y="2" width="6" height="13" rx="3"></rect><path d="M5 10a7 7 0 0 0 14 0"></path><line x1="12" y1="19" x2="12" y2="23"></line><line x1="8" y1="23" x2="16" y2="23"></line>
    </svg>
  </button>
  <div class="rec-info">
    <p id="rec-label" data-i18n="record_idle">Hold Space to record</p>
    <small data-i18n="record_help">In this window: hold Space and release to transcribe | Other windows: use the global hotkey</small>
  </div>
</div>
<div class="box">
  <div class="box-header">
    <span class="box-label" data-i18n="transcript_label">Transcript</span>
    <div class="box-actions">
      <button id="cancel-btn" type="button" style="display:none" data-i18n="cancel">Cancel</button>
      <button id="clear-btn" type="button" data-i18n="clear">Clear</button>
      <button id="copy-btn" type="button" data-i18n="copy">Copy</button>
    </div>
  </div>
  <div id="transcript"><span class="placeholder" data-i18n="transcript_placeholder">Transcription results will appear here...</span></div>
  <div id="dbg" class="debug"></div>
</div>
<div id="error-modal" class="modal-backdrop" role="dialog" aria-modal="true" aria-labelledby="error-title" aria-hidden="true">
  <div class="modal">
    <h2 id="error-title" data-i18n="operation_failed">Operation failed</h2>
    <p id="error-message">An unexpected error occurred.</p>
    <div class="modal-actions">
      <button class="secondary" id="error-copy" type="button" data-i18n="copy_details">Copy details</button>
      <button id="error-close" type="button" data-i18n="ok">OK</button>
    </div>
  </div>
</div>
<script src="/js/i18n.js"></script>
<script src="/js/dom.js"></script>
<script src="/js/modal.js"></script>
<script src="/js/api.js"></script>
<script src="/js/config.js"></script>
<script src="/js/hotkey.js"></script>
<script src="/js/settings.js"></script>
<script src="/js/recorder.js"></script>
<script src="/js/history.js"></script>
<script src="/js/status.js"></script>
<script src="/js/app.js"></script>
</body>
</html>
